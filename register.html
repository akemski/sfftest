<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silent Force</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(120,130,255,0.08), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(180,200,255,0.05), transparent 25%),
        #05060a;
      color: #f2f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 600px;
    }

    .top {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7e879a;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #9aa3b7;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 420px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 35px;
    }

    .field {
      position: relative;
    }

    input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding: 12px 4px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input::placeholder {
      color: #6f778a;
    }

    input:focus {
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }

    .button {
      margin-top: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .button:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .message {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #8f98aa;
      min-height: 20px;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6f778a;
    }

    .bottom a {
      color: #8a93a8;
      text-decoration: none;
    }

    .bottom a:hover {
      color: #cfd6e6;
    }

  </style>
</head>

<body>
  <div class="wrapper">

    <div class="top">silent force</div>

    <h1>you made it past the first layer</h1>
    <p class="subtitle">
      most people stop at what they see.  
      some keep going.
    </p>

    <form class="form" id="form">

      <div class="field">
        <input type="text" id="username" placeholder="choose a name" />
      </div>

      <div class="field">
        <input type="password" id="password" placeholder="set a key" />
      </div>

      <div class="field">
        <input type="text" id="tag" placeholder="@handle or sso name" />
      </div>

      <div class="button" onclick="submitForm()">continue</div>

    </form>

    <div class="message" id="message"></div>

    <div class="bottom">
      <a href="index.html">← back</a>
      <a href="login.html">already inside?</a>
    </div>

  </div>

  <script>
    function submitForm() {
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      const t = document.getElementById("tag").value.trim();
      const m = document.getElementById("message");

      if (!u || !p || !t) {
        m.textContent = "not enough yet.";
        return;
      }

      m.textContent = "saved. you can continue now.";
    }
  </script>
</body>
</html>
